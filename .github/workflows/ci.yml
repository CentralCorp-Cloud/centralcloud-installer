name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: 1.26.5, cache: true}
      - run: test -z "$(gofmt -l cmd internal)"
      - run: go vet ./...
      - run: go test -race ./...
      - run: bash -n scripts/bootstrap.sh
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: 1.26.5}
      - run: go test -tags=integration -v ./tests
